<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
    
<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}

body{
background:#000;
color:#fff;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
}

.container{
text-align:center;
padding:30px;
animation:fadeIn 2s ease;
max-width:700px;
}

h1{
font-family:'Playfair Display',serif;
font-size:38px;
line-height:1.45;
font-weight:600;
letter-spacing:0.5px;
}

.purple{
color:#c77dff;
font-weight:700;
}

p{
margin-top:28px;
font-size:20px;
color:#d7d7d7;
line-height:1.8;
}

button{
margin-top:45px;
padding:18px 42px;
font-size:22px;
border:none;
border-radius:60px;
background:#8a2be2;
color:white;
cursor:pointer;
transition:.35s;
box-shadow:0 0 30px rgba(138,43,226,.7);
}

button:hover{
transform:scale(1.05);
}

#videoPage{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
}

video{
width:100%;
height:100%;
object-fit:contain;
background:black;
}

.heart{
position:absolute;
color:#b266ff;
font-size:24px;
animation:float 8s linear infinite;
opacity:.4;
}

@keyframes float{
0%{transform:translateY(100vh);}
100%{transform:translateY(-120vh);}
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(40px);
}
to{
opacity:1;
transform:translateY(0);
}
}
</style>

</head>

<body>

<div class="container">

<h1>
Happiest Birthday,<br>
<span class="purple">My Dear Beautiful Potttii Ammaa 💜</span>
</h1>

<p>
Every smile of yours makes my world brighter.<br><br>
Every moment with you is my favorite memory.<br><br>
I made this little surprise with all my love... ❤️
</p>

<button onclick="openGift()">
🎁 Open Your Surprise
</button>

</div>

<div id="videoPage">

<video id="video" controls playsinline preload="auto">
    <source src="Video.mp4.MP4" type="video/mp4">
</video>

</div>

<script>

for(let i=0;i<18;i++){

const h=document.createElement("div");

h.className="heart";

h.innerHTML="💜";

h.style.left=Math.random()*100+"vw";

h.style.animationDuration=(6+Math.random()*6)+"s";

h.style.fontSize=(16+Math.random()*22)+"px";

document.body.appendChild(h);

}

function openGift() {

    document.querySelector(".container").style.display = "none";

    document.getElementById("videoPage").style.display = "block";

    const video = document.getElementById("video");

    video.style.display = "block";

    video.load();

    setTimeout(() => {
        video.play();
    }, 300);

}

document.getElementById("video").onended=function(){

document.body.innerHTML=`

<div style="display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:black;
flex-direction:column;
text-align:center;
padding:30px;
font-family:-apple-system;
">

<h1 style="font-size:50px;color:#c77dff;">
I Love You 💜
</h1>

<p style="font-size:24px;
margin-top:25px;
line-height:2;">
Today.<br>
Tomorrow.<br>
Forever.<br><br>

Happy Birthday Once Again,<br>
My Beautiful Potttii Ammaa ❤️
</p>

</div>

`;

}

</script>

</body>
</html>
